# Security
SECRET_KEY=replace-with-a-long-random-value
COOKIE_SECURE=0
APP_BASE_URL=http://127.0.0.1:5000

# Database: use Supabase or Render PostgreSQL in production
DATABASE_URL=sqlite:///local_links.db

# Initial administrator account
ADMIN_NAME=Site Administrator
ADMIN_EMAIL=admin@example.com
ADMIN_PASSWORD=ChangeThisPassword123!
RESET_ADMIN_PASSWORD=0

# Moyasar: use test keys first, then replace them with live keys
MOYASAR_PUBLISHABLE_KEY=pk_test_xxxxxxxxxxxxxxxxx
MOYASAR_SECRET_KEY=sk_test_xxxxxxxxxxxxxxxxx
MOYASAR_FORM_VERSION=1.12.0

# Prices are in halalas: 4900 = SAR 49.00
MONTHLY_PRICE_HALALAS=4900
MONTHLY_SUBSCRIPTION_DAYS=30
YEARLY_PRICE_HALALAS=49000
YEARLY_SUBSCRIPTION_DAYS=365

# One-time free trial for every newly registered user
FREE_TRIAL_DAYS=7
