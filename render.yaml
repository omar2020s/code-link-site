services:
  - type: web
    name: code-link-site
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: code-link-db
          property: connectionString

databases:
  - name: code-link-db
    plan: free
