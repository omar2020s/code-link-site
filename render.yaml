services:
  - type: web
    name: quality-library-mada
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE
        value: "1"
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESET_ADMIN_PASSWORD
        value: "0"
      - key: MOYASAR_PUBLISHABLE_KEY
        sync: false
      - key: MOYASAR_SECRET_KEY
        sync: false
      - key: MOYASAR_FORM_VERSION
        value: "1.12.0"
      - key: MONTHLY_PRICE_HALALAS
        value: "4900"
      - key: YEARLY_PRICE_HALALAS
        value: "49000"
