<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Code Link{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="nav">
    <a href="{{ url_for('index') }}" class="logo">Code Link</a>
    <span>احفظ أي كود وافتحه بلينك</span>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    Built with Flask + PostgreSQL
  </footer>

  <script>
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("تم نسخ اللينك");
      } catch (e) {
        prompt("انسخ اللينك:", text);
      }
    }
  </script>
</body>
</html>
