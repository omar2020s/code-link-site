{% extends "base.html" %}

{% block title %}{{ snippet.title }}{% endblock %}

{% block content %}
<section class="card">
  <div class="top-row">
    <div>
      <h1>{{ snippet.title }}</h1>
      <p class="muted">
        اللغة: {{ snippet.language }}
        —
        تاريخ الإنشاء: {{ snippet.created_at.strftime('%Y-%m-%d %H:%M') }}
      </p>
    </div>

    <a class="btn-secondary" href="{{ url_for('index') }}">كود جديد</a>
  </div>

  <div class="actions">
    <button onclick="copyText(window.location.href)">نسخ لينك الصفحة</button>
    <button onclick="copyText('{{ request.url_root.rstrip('/') }}{{ url_for('raw_code', slug=snippet.slug) }}')">
      نسخ لينك Raw
    </button>
    <a
      class="btn-secondary"
      href="{{ url_for('raw_code', slug=snippet.slug) }}"
      target="_blank"
    >
      فتح Raw
    </a>
  </div>

  <pre class="code-box"><code>{{ snippet.code }}</code></pre>
</section>
{% endblock %}
