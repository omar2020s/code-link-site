{% extends "base.html" %}

{% block title %}إنشاء لينك للكود{% endblock %}

{% block content %}
<section class="card">
  <h1>اكتب الكود وخد لينك مباشر</h1>
  <p class="muted">
    ضع أي كود هنا، وبعد الحفظ هيتعمل له لينك خاص تقدر تبعته لأي شخص.
  </p>

  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post" class="form">
    <label>عنوان الكود</label>
    <input
      type="text"
      name="title"
      placeholder="مثال: كود Flask Login"
      value="{{ title_value or '' }}"
    >

    <label>لغة الكود</label>
    <select name="language">
      {% set lang = language_value or 'python' %}
      <option value="python" {% if lang == 'python' %}selected{% endif %}>Python</option>
      <option value="javascript" {% if lang == 'javascript' %}selected{% endif %}>JavaScript</option>
      <option value="html" {% if lang == 'html' %}selected{% endif %}>HTML</option>
      <option value="css" {% if lang == 'css' %}selected{% endif %}>CSS</option>
      <option value="sql" {% if lang == 'sql' %}selected{% endif %}>SQL</option>
      <option value="text" {% if lang == 'text' %}selected{% endif %}>Text</option>
    </select>

    <label>الكود</label>
    <textarea
      name="code"
      placeholder="اكتب الكود هنا..."
      required
    >{{ code_value or '' }}</textarea>

    <button type="submit">إنشاء اللينك</button>
  </form>
</section>
{% endblock %}
