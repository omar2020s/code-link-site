{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <span class="eyebrow">Welcome back</span>
        <h1>Sign In</h1>
        <form method="post" class="stack-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Email Address
                <input type="email" name="email" required autocomplete="email" placeholder="name@example.com">
            </label>
            <label>Password
                <input type="password" name="password" required autocomplete="current-password">
            </label>
            <label class="check-row"><input type="checkbox" name="remember" value="1"> Remember me</label>
            <button class="btn primary full large" type="submit">Sign In</button>
        </form>
        <p class="muted-text">Do not have an account? <a href="{{ url_for('register') }}">Create one now</a>.</p>
    </div>
</section>
{% endblock %}
