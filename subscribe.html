{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <span class="eyebrow">مرحبًا بعودتك</span>
        <h1>تسجيل الدخول</h1>
        <form method="post" class="stack-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>البريد الإلكتروني
                <input type="email" name="email" required autocomplete="email" placeholder="name@example.com">
            </label>
            <label>كلمة المرور
                <input type="password" name="password" required autocomplete="current-password">
            </label>
            <label class="check-row"><input type="checkbox" name="remember" value="1"> تذكرني</label>
            <button class="btn primary full large" type="submit">دخول</button>
        </form>
        <p class="muted-text">ليس لديك حساب؟ <a href="{{ url_for('register') }}">أنشئ حسابًا جديدًا</a></p>
    </div>
</section>
{% endblock %}
